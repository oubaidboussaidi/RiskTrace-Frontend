<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
    <div>
        <h1 style="font-size: 24px; font-weight: 700;">Active Incidents</h1>
        <p style="color: var(--text-secondary);">Investigate and resolve detected security threats.</p>
    </div>
    <button class="btn btn-primary" (click)="toggleCreateForm()">
        <i data-lucide="plus-circle" size="18"></i> Report Incident
    </button>
</div>

<div class="card" *ngFor="let incident of incidents" style="margin-bottom: 12px; border-left: 4px solid;"
    [ngClass]="incident.borderClass">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px;">
                <span class="status-badge" [ngClass]="incident.severityClass">{{incident.severity}}</span>
                <span style="font-weight: 600; font-size: 15px;">{{incident.title}}</span>
            </div>
            <div style="color: var(--text-secondary); font-size: 12px;">{{incident.details}}</div>
        </div>
        <div style="display: flex; gap: 24px; align-items: center;">
            <div style="text-align: right;">
                <div style="font-size: 11px; color: var(--text-muted);">Assigned To</div>
                <div style="font-size: 13px;">{{incident.assignee}}</div>
            </div>
            <button class="btn" [ngClass]="incident.assignee === 'Unassigned' ? 'btn-secondary' : 'btn-primary'"
                (click)="updateStatus(incident)">
                {{incident.assignee === 'Unassigned' ? 'Assign Me' : 'Resolve'}}
            </button>

        </div>
    </div>
</div>

<!-- Create Incident Modal -->
<div class="modal-overlay" *ngIf="showCreateForm" (click)="showCreateForm = false">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 24px;">Report Security Incident</h2>

        <div class="form-group">
            <label>Incident Type</label>
            <select [(ngModel)]="newIncident.type"
                style="width: 100%; padding: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-primary); border-radius: 6px;">
                <option value="SUSPICIOUS_ACTIVITY">Suspicious Activity</option>
                <option value="UNAUTHORIZED_ACCESS">Unauthorized Access</option>
                <option value="DATA_LEAK">Data Leak</option>
                <option value="MALWARE_DETECTED">Malware Detected</option>
            </select>
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label>Severity Level</label>
            <select [(ngModel)]="newIncident.severity"
                style="width: 100%; padding: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-primary); border-radius: 6px;">
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="CRITICAL">Critical</option>
            </select>
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label>Description</label>
            <textarea [(ngModel)]="newIncident.description" rows="3" placeholder="Describe the incident..."
                style="width: 100%; padding: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-primary); border-radius: 6px;"></textarea>
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label>Target Path (Optional)</label>
            <input type="text" [(ngModel)]="newIncident.targetPath" placeholder="/api/endpoint">
        </div>

        <div style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
            <button class="btn btn-secondary" (click)="showCreateForm = false">Cancel</button>
            <button class="btn btn-primary" (click)="createIncident()">Submit Report</button>
        </div>
    </div>
</div>
