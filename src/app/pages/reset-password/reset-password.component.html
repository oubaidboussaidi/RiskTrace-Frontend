<div
    style="background: var(--bg-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 440px; padding: 48px; text-align: center;">

        <!-- Logo -->
        <div style="margin: 0 auto 24px; width: 48px; height: 48px; font-size: 24px;
                    background: linear-gradient(135deg, #58a6ff, #a371f7); border-radius: 8px;
                    display: flex; align-items: center; justify-content: center; font-weight: 700; color: white;">
            R
        </div>

        <!-- LOADING STATE -->
        <div *ngIf="state === 'loading'">
            <div style="font-size: 48px; margin-bottom: 20px;">⏳</div>
            <h2 style="color: var(--text-primary); margin-bottom: 12px;">{{ 'RESET_PW.SETTING' | translate }}</h2>
        </div>

        <!-- SUCCESS STATE -->
        <div *ngIf="state === 'success'">
            <div style="font-size: 56px; margin-bottom: 20px;">🎉</div>
            <h2 style="color: var(--text-primary); margin-bottom: 12px;">{{ 'RESET_PW.SUCCESS' | translate }}</h2>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" (click)="goToLogin()">
                {{ 'VERIFY_EMAIL.SIGNIN_BTN' | translate }}
            </button>
        </div>

        <!-- ERROR STATE (invalid/expired token) -->
        <div *ngIf="state === 'error'">
            <div style="font-size: 56px; margin-bottom: 20px;">🔗</div>
            <h2 style="color: var(--sev-critical); margin-bottom: 12px;">{{ 'RESET_PW.EXPIRED' | translate }}</h2>
            <p
                style="color: var(--text-secondary); font-size: 15px; line-height: 1.6; margin-bottom: 24px;
                      background: rgba(239,68,68,0.08); padding: 12px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.2);">
                {{ error }}
            </p>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" (click)="goToForgotPassword()">
                {{ 'LOGIN.SEND_RESET_LINK' | translate }}
            </button>
        </div>

        <!-- FORM STATE -->
        <div *ngIf="state === 'form'">
            <h1 style="margin-bottom: 8px; color: var(--text-primary);">{{ 'RESET_PW.TITLE' | translate }}</h1>
            <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 14px;">
                {{ 'RESET_PW.DESC' | translate }}
            </p>

            <!-- New Password -->
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 12px; color: var(--text-secondary);">{{ 'SETTINGS.NEW_PASSWORD' | translate }}</label>
                <div style="position: relative;">
                    <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword"
                        style="width: 100%; padding: 12px; padding-right: 40px; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: white; box-sizing: border-box;"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Confirm Password -->
            <div style="text-align: left; margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-size: 12px; color: var(--text-secondary);">{{ 'SETTINGS.CONFIRM_PASSWORD' | translate }}</label>
                <input [type]="'password'" [(ngModel)]="confirmPassword" (keyup.enter)="resetPassword()"
                    style="width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: white; box-sizing: border-box;"
                    placeholder="••••••••">
            </div>

            <button class="btn btn-primary" style="width: 100%; justify-content: center;" (click)="resetPassword()">
                {{ 'RESET_PW.SET_BTN' | translate }}
            </button>

            <div style="margin-top: 20px;">
                <a href="javascript:void(0)" (click)="goToLogin()"
                    style="font-size: 12px; color: var(--accent-primary); text-decoration: none;">
                    ← {{ 'LOGIN.BACK_TO_LOGIN' | translate }}
                </a>
            </div>
        </div>
    </div>
</div>
