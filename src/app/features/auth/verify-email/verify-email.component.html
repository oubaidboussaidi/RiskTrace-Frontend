<div
    style="background: var(--bg-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;">

    <div class="auth-controls">
        <button class="auth-ctrl-btn" (click)="toggleTheme()" [title]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
            <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <span class="auth-ctrl-divider"></span>
        <div class="auth-lang-switch">
            <button class="auth-lang-btn" [class.active]="languageService.currentLang === 'en'" (click)="languageService.setLanguage('en')">EN</button>
            <button class="auth-lang-btn" [class.active]="languageService.currentLang === 'fr'" (click)="languageService.setLanguage('fr')">FR</button>
        </div>
    </div>
    <div class="card" style="width: 440px; padding: 48px; text-align: center;">

        <div style="margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;">
            <img src="logo_cropped.png" alt="RiskTrace Logo" class="app-logo">
        </div>

        <div style="height: 1px; background: var(--border-color); margin-bottom: 24px; opacity: 0.5;"></div>

        <div *ngIf="state === 'loading'">
            <div class="auth-icon-wrap">
                <svg class="spinner-svg" xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" stroke="var(--border-color)" stroke-width="1.75" style="opacity: 0.15;"></circle>
                    <path d="M12 2a10 10 0 0 1 10 10"></path>
                </svg>
            </div>
            <h2 style="color: var(--text-primary); margin-bottom: 12px;">{{ 'VERIFY_EMAIL.VERIFYING' | translate }}</h2>
            <p style="color: var(--text-secondary); font-size: 14px;">{{ 'VERIFY_EMAIL.WAIT_CONFIRM' | translate }}</p>
        </div>

        <div *ngIf="state === 'success'">
            <div class="auth-alert-card success">
                <div class="auth-alert-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 11 2 2 4-4"/></svg>
                    <span class="auth-alert-title">{{ 'VERIFY_EMAIL.VERIFIED' | translate }}</span>
                </div>
                <p class="auth-alert-desc">
                    {{ 'VERIFY_EMAIL.SUCCESS_DESC' | translate }}
                </p>
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" (click)="goToLogin()">
                {{ 'VERIFY_EMAIL.SIGNIN_BTN' | translate }}
            </button>
        </div>

        <div *ngIf="state === 'error'">
            <div class="auth-alert-card error">
                <div class="auth-alert-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                    <span class="auth-alert-title">{{ 'VERIFY_EMAIL.FAILED' | translate }}</span>
                </div>
                <p class="auth-alert-desc">
                    {{ message | translate }}
                </p>
            </div>

            <div *ngIf="isExpired" style="margin-bottom: 24px;">
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
                    {{ 'VERIFY_EMAIL.RESEND_DESC' | translate }}
                </p>
                <input type="email" [(ngModel)]="email" style="width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border-color);
                           border-radius: var(--radius-md); color: var(--text-primary); margin-bottom: 12px; box-sizing: border-box;"
                    placeholder="your@email.com">
                <button class="btn btn-secondary" style="width: 100%; justify-content: center; gap: 8px;"
                    (click)="resendVerification()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    {{ 'VERIFY_EMAIL.RESEND_BTN' | translate }}
                </button>
            </div>

            <button class="btn btn-secondary" style="width: 100%; justify-content: center;" (click)="goToLogin()">
                ← {{ 'LOGIN.BACK_TO_LOGIN' | translate }}
            </button>
        </div>

    </div>
</div>
